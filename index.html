<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行靈感 · Travel Muse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --dark: #0d0d0d;
  --gold: #c9a96e;
  --gold-light: #d4b47e;
  --text: #f0ece4;
  --card: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.12);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* ── Welcome ── */
#welcome {
  background: radial-gradient(ellipse at 50% 40%, rgba(201,169,110,0.12) 0%, transparent 65%), #0d0d0d;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* Decorative border frame */
.welcome-frame {
  position: absolute;
  inset: clamp(16px, 3.5vw, 44px);
  border: 1px solid rgba(201,169,110,0.16);
  pointer-events: none;
  animation: frame-in 1.4s ease both;
}
@keyframes frame-in {
  from { opacity: 0; transform: scale(1.015); }
  to   { opacity: 1; transform: scale(1); }
}

/* Corner brackets */
.fc {
  position: absolute;
  width: 20px; height: 20px;
  border-color: rgba(201,169,110,0.7);
  border-style: solid;
}
.fc.tl { top: -1px;    left: -1px;  border-width: 2px 0 0 2px; }
.fc.tr { top: -1px;    right: -1px; border-width: 2px 2px 0 0; }
.fc.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
.fc.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* Mid-edge tick marks */
.fm {
  position: absolute;
  background: rgba(201,169,110,0.35);
}
.fm.h { width: 16px; height: 1px; top: -1px; left: 50%; transform: translateX(-50%); }
.fm.hb { top: auto; bottom: -1px; }
.fm.v { width: 1px; height: 16px; left: -1px; top: 50%; transform: translateY(-50%); }
.fm.vr { left: auto; right: -1px; }

/* Eyebrow with flanking lines */
.welcome-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  opacity: 0.75;
}
.welcome-eyebrow::before,
.welcome-eyebrow::after {
  content: '';
  display: block;
  width: 36px;
  height: 1px;
  background: rgba(201,169,110,0.5);
}

/* Centre ornament between eyebrow and title */
.welcome-ornament {
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 10px;
  margin-bottom: 20px;
  opacity: 0.55;
}
.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(52px, 9vw, 104px);
  font-weight: 700;
  line-height: 1.15;
  padding-bottom: 0.05em;
  margin-bottom: 16px;
  background: linear-gradient(145deg, #f0ece4 30%, #c9a96e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: font-weight 0.3s ease, font-style 0.3s ease;
}
.welcome-title.en {
  font-weight: 400;
  font-style: italic;
  letter-spacing: -0.5px;
}
.welcome-title-en {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(18px, 3vw, 28px);
  font-weight: 400;
  color: rgba(240,236,228,0.35);
  margin-bottom: 40px;
}
.welcome-sub {
  font-size: 14px;
  font-weight: 300;
  color: rgba(240,236,228,0.5);
  letter-spacing: 1px;
  margin-bottom: 56px;
}
.start-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 17px 44px;
  background: var(--gold);
  color: #0d0d0d;
  border: none;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.start-btn:hover {
  background: var(--gold-light);
  transform: translateY(-3px);
  box-shadow: 0 10px 36px rgba(201,169,110,0.35);
}

/* ── Quiz ── */
#quiz {
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(201,169,110,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 50%, rgba(110,150,201,0.04) 0%, transparent 55%),
    #0d0d0d;
}

.progress {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  gap: 3px;
}
.progress-bar {
  height: 2px;
  flex: 1;
  background: rgba(255,255,255,0.08);
  transition: background 0.6s ease;
}
.progress-bar.done { background: var(--gold); }

.q-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 660px;
  text-align: center;
}
.q-step {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 18px;
  opacity: 0.8;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 400;
  line-height: 1.45;
  margin-bottom: 44px;
}
.options { display: flex; flex-direction: column; gap: 14px; }

.opt {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 22px 28px;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  backdrop-filter: blur(20px);
  cursor: pointer;
  text-align: left;
  width: 100%;
  transition: all 0.25s ease;
}
.opt:hover {
  background: rgba(201,169,110,0.11);
  border-color: rgba(201,169,110,0.45);
  transform: translateX(8px);
}
.opt:hover .opt-icon { transform: scale(1.2); }
.opt-icon { font-size: 26px; flex-shrink: 0; transition: transform 0.25s ease; }
.opt-text { font-size: 16px; font-weight: 300; letter-spacing: 0.5px; }

/* ── Loading ── */
#loading {
  background: #0d0d0d;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.loading-label {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--gold);
  animation: fade-pulse 2s ease-in-out infinite;
}
.dots { display: flex; gap: 9px; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold);
  animation: bounce 1.4s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%,80%,100% { transform: scale(0.4); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}
@keyframes fade-pulse {
  0%,100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ── Result ── */
#result { background: #000; }

.carousel {
  position: absolute;
  inset: 0;
  overflow: hidden;
}
.carousel-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.9s ease;
}
.carousel-slide.active { opacity: 1; }

.shimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.carousel-slide img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.9s ease;
  transform: scale(1.04);
  transition: opacity 0.9s ease, transform 5s ease;
}
.carousel-slide.active img { transform: scale(1); }
.carousel-slide img.in { opacity: 1; }

.carousel-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 25;
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.25s ease;
  user-select: none;
}
.carousel-arrow:hover { background: rgba(255,255,255,0.25); }
.carousel-prev { left: 28px; }
.carousel-next { right: 28px; }

.carousel-dots {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 25;
  display: none; /* 隐藏 - 只有1张照片 */
  gap: 6px;
}
.carousel-dot {
  width: 28px; height: 2px;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: background 0.35s ease, width 0.35s ease;
}
.carousel-dot.active { background: #fff; width: 44px; }

.result-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.35) 38%, transparent 65%);
  z-index: 10;
  pointer-events: none;
}

.result-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 44px 52px;
  z-index: 20;
}
.r-name {
  font-family: 'Playfair Display', serif;
  font-size: clamp(44px, 7vw, 92px);
  font-weight: 800;
  line-height: 1;
  margin-bottom: 12px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.7), 0 4px 16px rgba(0,0,0,0.5);
}
.r-sub {
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  font-weight: 600;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}
.r-desc {
  font-size: 14px;
  font-weight: 400;
  line-height: 1.85;
  color: rgba(240,236,228,0.95);
  max-width: 520px;
  margin-bottom: 20px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.r-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.r-tag {
  padding: 5px 13px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: rgba(240,236,228,0.95);
  backdrop-filter: blur(10px);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.r-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.abtn {
  padding: 13px 26px;
  border: none;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  gap: 7px;
}
.abtn-primary { background: var(--gold); color: #0d0d0d; }
.abtn-primary:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(201,169,110,0.4);
}
.abtn-secondary {
  background: rgba(255,255,255,0.09);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
}
.abtn-secondary:hover { background: rgba(255,255,255,0.16); transform: translateY(-2px); }
.abtn-ghost {
  background: transparent;
  color: rgba(240,236,228,0.55);
  border: 1px solid rgba(255,255,255,0.1);
}
.abtn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.28); transform: translateY(-2px); }

/* saved toast */
.toast {
  position: fixed;
  bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(201,169,110,0.95);
  color: #0d0d0d;
  padding: 12px 28px;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 1px;
  z-index: 999;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Language toggle ── */
.lang-toggle {
  position: absolute;
  top: 28px; right: 36px;
  display: flex;
  gap: 6px;
  z-index: 10;
}
.lang-btn {
  padding: 5px 13px;
  background: transparent;
  border: 1px solid rgba(201,169,110,0.25);
  color: rgba(240,236,228,0.45);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.25s ease;
}
.lang-btn.active {
  background: rgba(201,169,110,0.14);
  border-color: rgba(201,169,110,0.6);
  color: var(--gold);
}
.lang-btn:hover:not(.active) {
  border-color: rgba(201,169,110,0.4);
  color: rgba(240,236,228,0.75);
}

/* ── Tips Screen ── */
#tips {
  background: linear-gradient(135deg, rgba(201,169,110,0.08) 0%, rgba(20,20,40,0.8) 100%), var(--dark);
  overflow-y: auto;
  align-items: center;
  padding: 40px 20px;
  display: flex;
}

.tips-container {
  width: 100%;
  max-width: 720px;
  padding: 44px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(20,20,40,0.6);
  backdrop-filter: blur(10px);
}

.tips-close {
  background: none;
  border: none;
  color: var(--gold);
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  margin-bottom: 24px;
  padding: 0;
  transition: color 0.3s;
}

.tips-close:hover {
  color: var(--gold-light);
}

.tips-header {
  margin-bottom: 36px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 24px;
}

.tips-title {
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 8px 0;
  background: linear-gradient(135deg, var(--text), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tips-subtitle {
  font-size: 13px;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 0;
  opacity: 0.8;
}

.tips-content {
  margin-bottom: 32px;
}

.tips-section {
  margin-bottom: 28px;
}

.tips-section-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--gold-light);
  margin: 0 0 12px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.tips-text {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(240,236,228,0.85);
  margin: 0;
  padding-left: 24px;
}

.tips-action-btn {
  width: 100%;
  padding: 14px 0;
  background: var(--gold);
  color: var(--dark);
  border: none;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: none;
}

.tips-action-btn:hover {
  background: var(--gold-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(201,169,110,0.3);
}

/* ── Responsive ── */
@media (max-width: 700px) {
  .photos-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1.3fr 1fr 1fr;
  }
  .photo-cell:first-child {
    grid-column: 1 / 3;
    grid-row: 1 / 2;
  }
  .result-info { padding: 28px 22px; }
  .r-actions { flex-direction: column; }
  .abtn { width: 100%; justify-content: center; }

  .tips-container { padding: 32px 20px; }
  .tips-title { font-size: 28px; }
}
</style>
</head>
<body>

<!-- Welcome -->
<div id="welcome" class="screen active">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <div class="welcome-frame" aria-hidden="true">
    <span class="fc tl"></span>
    <span class="fc tr"></span>
    <span class="fc bl"></span>
    <span class="fc br"></span>
    <span class="fm h"></span>
    <span class="fm h hb"></span>
    <span class="fm v"></span>
    <span class="fm v vr"></span>
  </div>
  <div class="welcome-eyebrow">Travel Muse</div>
  <div class="welcome-ornament">✦ ✦ ✦</div>
  <h1 class="welcome-title" id="welcome-title">旅行靈感</h1>
  <div class="welcome-title-en">Find Your Next Destination</div>
  <p class="welcome-sub" id="welcome-tagline">三個問題，一座屬於你的城市</p>
  <button class="start-btn" id="start-btn" onclick="startQuiz()">開始探索 →</button>
</div>

<!-- Quiz -->
<div id="quiz" class="screen">
  <div class="progress" id="progress">
    <div class="progress-bar"></div>
    <div class="progress-bar"></div>
    <div class="progress-bar"></div>
  </div>
  <div class="q-wrap" id="qWrap"></div>
</div>

<!-- Loading -->
<div id="loading" class="screen">
  <div class="loading-label" id="loading-label">正在尋找你的城市⋯</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<!-- Result -->
<div id="result" class="screen">
  <div class="carousel" id="photosGrid"></div>
  <div class="carousel-dots" id="carouselDots"></div>
  <div class="result-overlay"></div>
  <div class="result-info" id="resultInfo"></div>
</div>

<!-- Tips -->
<div id="tips" class="screen">
  <div class="tips-container">
    <button class="tips-close" onclick="show('result')">← 返回</button>

    <div class="tips-header">
      <h2 class="tips-title"></h2>
      <p class="tips-subtitle"></p>
    </div>

    <div class="tips-content">
      <div class="tips-section">
        <h3 class="tips-section-title" id="tips-weather-title">🌦 天氣氣候</h3>
        <p class="tips-text" id="tips-weather"></p>
      </div>

      <div class="tips-section">
        <h3 class="tips-section-title" id="tips-culture-title">🏛 文化禁忌</h3>
        <p class="tips-text" id="tips-culture"></p>
      </div>

      <div class="tips-section">
        <h3 class="tips-section-title" id="tips-voltage-title">⚡ 電源電壓</h3>
        <p class="tips-text" id="tips-voltage"></p>
      </div>
    </div>

    <button class="tips-action-btn" id="tips-map-btn" onclick="openGoogleMap()">查看Google Map</button>
  </div>
</div>

<div class="toast" id="toast">已收藏，享受你的旅程 ✦</div>

        { icon: "🌃", text: "繁華都市，璀璨迷人的夜晚", val: "city" },

  adventure_seafood_beach:  ["sydney","dubrovnik"],
  adventure_seafood_city:   ["barcelona","istanbul"],
  adventure_seafood_nature: ["queenstown","bergen"],

  culture_street_nature:    ["luangprabang","chiangmai"],

};

// ─── State ─────────────────────────────────────────
let answers = [];
let currentQ = 0;
let cycleIndex = 0;

// ─── Language ────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.getElementById('btn-zh').classList.toggle('active', l === 'zh');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  const titleEl = document.getElementById('welcome-title');
  titleEl.classList.toggle('en', l === 'en');
  if (l === 'zh') {
    titleEl.textContent = '旅行靈感';
    document.getElementById('welcome-tagline').textContent = '三個問題，一座屬於你的城市';
    document.getElementById('start-btn').textContent = '開始探索 →';
  } else {
    titleEl.textContent = 'Travel Muse';
    document.getElementById('welcome-tagline').textContent = 'Three questions. One city. Just for you.';
    document.getElementById('start-btn').textContent = 'Start Exploring →';
  }
}

// ─── Screens ────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── Quiz ────────────────────────────────────────────
function startQuiz() {
  answers = [];
  currentQ = 0;
  cycleIndex = 0;
  show('quiz');
  renderQ(0, false);
}

function renderQ(idx, fromNext) {
  const q = questions[lang][idx];
  const bars = document.querySelectorAll('.progress-bar');
  bars.forEach((b, i) => b.classList.toggle('done', i < idx));

  const wrap = document.getElementById('qWrap');
  if (fromNext) {
    wrap.style.transition = 'none';
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateY(24px)';
  }

  wrap.innerHTML = `
    <div class="q-step">${q.step}</div>
    <h2 class="q-text">${q.text}</h2>
    <div class="options">
      ${q.opts.map(o => `
        <button class="opt" onclick="pick('${o.val}')">
          <span class="opt-icon">${o.icon}</span>
          <span class="opt-text">${o.text}</span>
        </button>`).join('')}
    </div>`;

  requestAnimationFrame(() => {
    wrap.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    wrap.style.opacity = '1';
    wrap.style.transform = 'translateY(0)';
  });
}

function pick(val) {
  answers.push(val);
  if (currentQ < 2) {
    const wrap = document.getElementById('qWrap');
    wrap.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
    wrap.style.opacity = '0';
    wrap.style.transform = 'translateY(-20px)';
    currentQ++;
    setTimeout(() => renderQ(currentQ, true), 290);
  } else {
    loading();
  }
}

// ─── Loading ──────────────────────────────────────────
function loading() {
  document.getElementById('loading-label').textContent =
    lang === 'en' ? 'Finding your city…' : '正在尋找你的城市⋯';
  show('loading');
  showResult();
}

// ─── Result ───────────────────────────────────────────
let slideIdx = 0;
let slideTimer = null;

function getCity() {
  const key = answers.join('_');
  const pool = cityMap[key] || ["tokyo","bali"];
  return pool[cycleIndex % pool.length];
}

function showResult() {
  const key = getCity();
  const c = cities[key];

  // Generate 3 Unsplash images using city name with travel keywords
  const grid = document.getElementById('photosGrid');
  const cityEn = c.nameEn;
  const photos = [
    `https://source.unsplash.com/1600x900/?${encodeURIComponent(cityEn)},destination`,
    `https://source.unsplash.com/1600x900/?${encodeURIComponent(cityEn)},travel,tourism`,
    `https://source.unsplash.com/1600x900/?${encodeURIComponent(cityEn)},city`
  ];

  grid.innerHTML = photos.map((url, idx) => `
    <div class="carousel-slide${idx === 0 ? ' active' : ''}">
      <div class="shimmer"></div>
      <img src="${url}" alt="">
    </div>`
  ).join('');

  // Load images
  const imgs = grid.querySelectorAll('img');
  imgs.forEach(img => {
    img.onload = () => {
      img.classList.add('in');
      img.closest('.carousel-slide').querySelector('.shimmer').style.opacity = '0';
    };
    img.onerror = () => {
      img.closest('.carousel-slide').querySelector('.shimmer').style.background = 'linear-gradient(135deg,#1a1a2e,#16213e)';
    };
  });

  // Show dots and build them
  const dotsEl = document.getElementById('carouselDots');
  dotsEl.style.display = 'flex';
  dotsEl.innerHTML = photos.map((_, i) =>
    `<div class="carousel-dot${i === 0 ? ' active' : ''}" onclick="goSlide(${i})"></div>`
  ).join('');

  slideIdx = 0;
  startCarousel();

  // Info panel
  const en = lang === 'en';
  document.getElementById('resultInfo').innerHTML = `
    <div class="r-name">${en ? c.nameEn : c.name}</div>
    <div class="r-sub">${en ? c.subEn : c.sub}</div>
    <p class="r-desc">${en ? c.descEn : c.desc}</p>
    <div class="r-tags">${(en ? c.tagsEn : c.tags).map(t=>`<span class="r-tag">${t}</span>`).join('')}</div>
    <div class="r-actions">
      <button class="abtn abtn-primary" onclick="keepCity()">${en ? 'This is the one ✦' : '就是這裡了 ✦'}</button>
      <button class="abtn abtn-secondary" onclick="regen()">${en ? '↺ Try another city' : '↺ 換一個城市'}</button>
      <button class="abtn abtn-ghost" onclick="startQuiz()">${en ? '← Start over' : '← 重新作答'}</button>
    </div>`;

  show('result');
}

function goSlide(n) {
  const slides = document.querySelectorAll('.carousel-slide');
  const dots = document.querySelectorAll('.carousel-dot');
  if (!slides.length) return;
  slides[slideIdx].classList.remove('active');
  dots[slideIdx].classList.remove('active');
  slideIdx = (n + slides.length) % slides.length;
  slides[slideIdx].classList.add('active');
  dots[slideIdx].classList.add('active');
  // reset auto-advance on manual interaction
  startCarousel();
}

function startCarousel() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = setInterval(() => goSlide(slideIdx + 1), 4500);
}

function stopCarousel() {
  if (slideTimer) { clearInterval(slideTimer); slideTimer = null; }
}

function regen() {
  stopCarousel();
  cycleIndex++;
  loading();
}

function keepCity() {
  const key = getCity();
  const c = cities[key];
  const en = lang === 'en';

  document.querySelector('.tips-title').textContent = en ? c.nameEn : c.name;
  document.querySelector('.tips-subtitle').textContent = en ? c.subEn : c.sub;
  document.getElementById('tips-weather-title').textContent = en ? '🌦 Weather & Climate' : '🌦 天氣氣候';
  document.getElementById('tips-culture-title').textContent = en ? '🏛 Cultural Customs' : '🏛 文化禁忌';
  document.getElementById('tips-voltage-title').textContent = en ? '⚡ Electrical Voltage' : '⚡ 電源電壓';
  document.getElementById('tips-weather').textContent = en ? c.weatherEn : c.weather;
  document.getElementById('tips-culture').textContent = en ? c.cultureTipsEn : c.cultureTips;
  document.getElementById('tips-voltage').textContent = en ? c.voltageEn : c.voltage;
  document.getElementById('tips-map-btn').textContent = en ? 'View on Google Maps' : '查看Google Map';

  show('tips');
}

function openGoogleMap() {
  const key = getCity();
  const c = cities[key];
  const cityName = lang === 'en' ? c.nameEn : c.name;
  const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(cityName)}`;
  window.open(mapsUrl, '_blank');
}
